name: Render newsletter and upload to Mailchimp

on:
  repository_dispatch:
    types: [render-newsletter]
  workflow_dispatch:
    inputs:
      template_name:
        description: Mailchimp template name
        required: true
        type: string
      rules_file:
        description: Path to rules JSON (object or array of objects)
        required: false
        default: input.json
        type: string
      publish_to_github_pages:
        description: Run deploy-github-pages (needs Settings → Pages → Source = GitHub Actions)
        required: false
        default: true
        type: boolean

concurrency:
  group: newsletter-render
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Save client payload (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          printf '%s' "$PAYLOAD" > client_payload.json
          echo "========== repository_dispatch client_payload =========="
          echo "$PAYLOAD" | jq . 2>/dev/null || echo "$PAYLOAD"
          echo "========================================================"

      - name: Build client payload (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          RULES_FILE: ${{ github.event.inputs.rules_file }}
        run: |
          test -f "$RULES_FILE" || { echo "Rules file not found: $RULES_FILE" >&2; exit 1; }
          jq -n \
            --arg name "${{ github.event.inputs.template_name }}" \
            --slurpfile rules "$RULES_FILE" \
            '{templateName: $name, rules: $rules[0]}' > client_payload.json
          echo "========== workflow_dispatch client_payload (built) =========="
          jq . client_payload.json
          echo "==============================================================="

      - name: Install dependencies
        run: npm ci

      - name: Render HTML and Mailchimp JSON
        run: npm run render -- --config client_payload.json --template-html template.html --out-dir dist

      - name: Prepare GitHub Pages bundle
        run: |
          mkdir -p pages-out
          cp dist/rendered.html pages-out/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-out

      - name: Upload dist for Mailchimp job
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-dist
          path: dist/

  # 404 here = repo Pages is not set to "GitHub Actions" (see reminder step + README).
  deploy-github-pages:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish_to_github_pages != 'false'
    needs: render
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages

      - name: Pages deploy failed — how to fix 404
        if: steps.deployment.outcome != 'success'
        run: |
          echo "::warning::GitHub Pages deploy did not succeed. Until this is fixed, the site URL will not update."
          echo "::warning::Repo owner: open https://github.com/${{ github.repository }}/settings/pages"
          echo "::warning::Set Build and deployment → Source → GitHub Actions (not Deploy from a branch), then Save, then re-run this workflow."

  upload-mailchimp:
    needs: render
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download rendered dist
        uses: actions/download-artifact@v4
        with:
          name: newsletter-dist
          path: dist

      - name: Extract Mailchimp datacenter
        id: mailchimp_dc
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
        run: |
          if [ -z "$MAILCHIMP_API_KEY" ]; then
            echo "MAILCHIMP_API_KEY secret is not set" >&2
            exit 1
          fi
          dc="${MAILCHIMP_API_KEY##*-}"
          echo "dc=$dc" >> "$GITHUB_OUTPUT"

      - name: Upload template to Mailchimp
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_DC: ${{ steps.mailchimp_dc.outputs.dc }}
        run: |
          curl -sS -f \
            -X POST "https://${MAILCHIMP_DC}.api.mailchimp.com/3.0/templates" \
            -u "anystring:${MAILCHIMP_API_KEY}" \
            -H "Content-Type: application/json" \
            --data-binary @dist/upload.json \
            -o mailchimp-response.json
          echo "Mailchimp response:"
          cat mailchimp-response.json
